<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOOR CODEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ground: #0c0b09;
    --panel: #16140f;
    --panel-alt: #1c1912;
    --border: #3a3222;
    --border-bright: #6b5a34;
    --text: #c9c0aa;
    --text-dim: #6e6650;
    --gold: #a9873f;
    --blood: #7a2a1f;
    --blood-bright: #a83c2a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--ground); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .topbar {
    border-bottom: 2px solid var(--border-bright);
    background: var(--panel);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar h1 {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin: 0;
  }
  .topbar .count { color: var(--text-dim); font-size: 12px; letter-spacing: 0.05em; }

  #status { padding: 40px 24px; color: var(--text-dim); font-size: 13px; letter-spacing: 0.05em; }
  main { max-width: 980px; margin: 0 auto; padding: 20px 20px 80px; }

  .zone-block { border: 1px solid var(--border); margin-bottom: 10px; }

  .zone-row {
    display: grid;
    grid-template-columns: 50px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 16px;
    background: var(--panel-alt);
    border-bottom: 2px solid var(--border-bright);
    cursor: pointer;
    user-select: none;
  }
  .zone-row:hover { background: #221e15; }

  .zone-chevron {
    font-size: 14px;
    color: var(--gold);
    transition: transform 0.15s ease;
    width: 16px;
  }
  .zone-block.open .zone-chevron { transform: rotate(90deg); }

  .zone-name-block { display: flex; flex-direction: column; gap: 2px; }
  .zone-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.06em;
    color: var(--text);
    text-transform: uppercase;
  }
  .zone-range { font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; }

  .zone-thumbs { display: flex; gap: 6px; }
  .zone-thumbs img {
    width: 32px; height: 32px; object-fit: cover;
    border: 1px solid var(--border-bright);
  }
  .zone-thumbs .no-img {
    width: 32px; height: 32px; background: var(--panel);
    border: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--text-dim);
  }

  .floor-list { display: none; }
  .zone-block.open .floor-list { display: block; }

  .col-headers {
    display: grid;
    grid-template-columns: 60px 1fr 100px 100px 90px 60px;
    padding: 6px 16px;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .floor-row {
    display: grid;
    grid-template-columns: 60px 1fr 100px 100px 90px 60px;
    align-items: center;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  .floor-row:nth-child(even) { background: var(--panel-alt); }
  .floor-row.boss { background: linear-gradient(90deg, rgba(122,42,31,0.18), var(--panel)); border-left: 3px solid var(--blood-bright); }

  .f-num { font-weight: 700; color: var(--text); font-size: 14px; }
  .floor-row.boss .f-num { color: var(--blood-bright); }
  .f-name { font-family: 'Cinzel', serif; font-weight: 600; font-size: 14px; color: var(--text); }
  .f-encounter, .f-type, .f-tier { font-size: 11px; color: var(--text-dim); }
  .f-boss-mark { text-align: center; font-size: 14px; color: var(--blood-bright); }

  .cover-row { grid-column: 1 / -1; padding: 8px 0 4px; }
  .cover-placeholder { height: 4px; background: repeating-linear-gradient(90deg, var(--border) 0 6px, transparent 6px 12px); opacity: 0.4; }
  .cover-image { width: 100%; max-height: 100px; object-fit: cover; border: 1px solid var(--border); }

  .creature-list { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 6px; padding-top: 8px; margin-top: 8px; border-top: 1px solid var(--border); }
  .creature-tag {
    display: flex; align-items: center; gap: 6px;
    background: var(--ground); border: 1px solid var(--border);
    padding: 2px 8px 2px 2px; text-decoration: none; color: inherit;
  }
  .creature-tag:hover { border-color: var(--gold); }
  .creature-tag img { width: 22px; height: 22px; object-fit: cover; border: 1px solid var(--border-bright); }
  .creature-tag .no-img { width: 22px; height: 22px; background: var(--panel-alt); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--text-dim); }
  .creature-tag .cn { font-size: 11px; color: var(--text); }
  .creature-tag .cs { font-size: 9px; color: var(--text-dim); }

  .empty-mark { grid-column: 1 / -1; font-size: 10px; color: var(--text-dim); opacity: 0.5; padding-top: 6px; }

  @media (max-width: 700px) {
    .col-headers, .floor-row { grid-template-columns: 40px 1fr 50px; }
    .f-tier, .f-type { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>FLOOR CODEX</h1>
  <div class="count" id="floor-count">— / 100</div>
</div>

<div id="status">LOADING...</div>
<main id="main" style="display:none;"></main>

<script>
const FLOORS_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/floors.csv";
const CREATURES_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/creatures.csv";

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') {}
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.filter(r => r.length > 1 || r[0]).map(r => {
    const obj = {};
    header.forEach((h, idx) => obj[h] = r[idx] ?? '');
    return obj;
  });
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

async function load() {
  try {
    const [floorsText, creaturesText] = await Promise.all([
      fetch(FLOORS_URL).then(r => r.text()),
      fetch(CREATURES_URL).then(r => r.text()),
    ]);
    const floors = parseCSV(floorsText);
    const creatures = parseCSV(creaturesText);

    const byFloor = {};
    creatures.forEach(c => {
      (c.Floor_Found || '').split(';').map(s => s.trim()).filter(Boolean).forEach(f => {
        if (!byFloor[f]) byFloor[f] = [];
        byFloor[f].push(c);
      });
    });

    floors.sort((a,b) => parseInt(a.Floor) - parseInt(b.Floor));
    document.getElementById('floor-count').textContent = floors.length + ' / 100';

    // group by zone
    const zones = [];
    let currentZone = null;
    floors.forEach(f => {
      if (f.Zone !== currentZone) {
        currentZone = f.Zone;
        zones.push({ name: currentZone, floors: [] });
      }
      zones[zones.length - 1].floors.push(f);
    });

    const main = document.getElementById('main');
    let html = '';

    zones.forEach((zone, zi) => {
      const range = `${zone.floors[0].Floor}–${zone.floors[zone.floors.length-1].Floor}`;

      // unique creatures across this zone's floors
      const seen = new Set();
      const zoneCreatures = [];
      zone.floors.forEach(f => {
        (byFloor[f.Floor] || []).forEach(c => {
          if (!seen.has(c.ID)) { seen.add(c.ID); zoneCreatures.push(c); }
        });
      });

      html += `<div class="zone-block" id="zone-${zi}">`;
      html += `<div class="zone-row" onclick="toggleZone(${zi})">`;
      html += `<span class="zone-chevron">▶</span>`;
      html += `<div class="zone-name-block"><span class="zone-name">${escapeHtml(zone.name)}</span><span class="zone-range">FLOORS ${range}</span></div>`;
      html += `<div class="zone-thumbs">`;
      if (zoneCreatures.length) {
        zoneCreatures.forEach(c => {
          html += c.Image_Path ? `<img src="${escapeHtml(c.Image_Path)}" alt="${escapeHtml(c.Name)}" title="${escapeHtml(c.Name)}">` : `<div class="no-img">?</div>`;
        });
      } else {
        html += `<span style="font-size:10px;color:var(--text-dim);">NO CREATURES YET</span>`;
      }
      html += `</div></div>`;

      html += `<div class="floor-list">`;
      html += `<div class="col-headers"><span>FLR</span><span>NAME</span><span>ENCOUNTER</span><span>TYPE</span><span>TIER</span><span>BOSS</span></div>`;

      zone.floors.forEach(f => {
        const isBoss = f.Is_Boss === 'Yes';
        const found = byFloor[f.Floor] || [];
        html += `<div class="floor-row ${isBoss ? 'boss' : ''}">`;
        html += `<div class="f-num">${f.Floor}</div>`;
        html += `<div class="f-name">${escapeHtml(f.Visual_Theme || f.Zone)}</div>`;
        html += `<div class="f-encounter">${escapeHtml(f.Encounter_Type)}</div>`;
        html += `<div class="f-type">${escapeHtml(f.Primary_Type || '—')}</div>`;
        html += `<div class="f-tier">${escapeHtml(f.Tier || '—')}</div>`;
        html += `<div class="f-boss-mark">${isBoss ? '☠' : '—'}</div>`;

        html += f.Cover_Image_Path
          ? `<div class="cover-row"><img class="cover-image" src="${escapeHtml(f.Cover_Image_Path)}" alt=""></div>`
          : `<div class="cover-row"><div class="cover-placeholder"></div></div>`;

        if (found.length) {
          html += `<div class="creature-list">`;
          found.forEach(c => {
            html += `<a class="creature-tag" href="creature.html?id=${escapeHtml(c.ID)}">`;
            html += c.Image_Path ? `<img src="${escapeHtml(c.Image_Path)}" alt="">` : `<div class="no-img">?</div>`;
            html += `<span class="cn">${escapeHtml(c.Name)}</span><span class="cs">S${escapeHtml(c.Stage)}</span>`;
            html += `</a>`;
          });
          html += `</div>`;
        } else {
          html += `<div class="empty-mark">NO CREATURES ASSIGNED</div>`;
        }
        html += `</div>`;
      });

      html += `</div></div>`;
    });

    main.innerHTML = html;
    document.getElementById('status').style.display = 'none';
    main.style.display = 'block';
  } catch (err) {
    document.getElementById('status').textContent = 'LOAD FAILED: ' + err.message;
  }
}

function toggleZone(i) {
  document.getElementById('zone-' + i).classList.toggle('open');
}

load();
</script>
</body>
</html>
