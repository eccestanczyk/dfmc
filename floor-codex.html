<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOOR MAP</title>
<link rel="stylesheet" href="theme.css">
<style>
  .creature-tag.art-pending { border: 2px solid #c0392b; background: rgba(192,57,43,0.15); }
  /* Ground-plate floor map (same layout as floor.html) */
  .floor-map{ position:relative; isolation:isolate; width:100%; aspect-ratio:3/2; background:#0d0a07; border:1px solid var(--rule);
    box-shadow:inset 0 0 60px rgba(0,0,0,0.55), 0 6px 18px rgba(0,0,0,0.4); overflow:hidden; grid-column:1 / -1; margin-top:10px; }
  .fmc-plate{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
  .fm-creature{ position:absolute; transform:translate(-50%,-50%); text-decoration:none; display:block; }
  .fm-creature .fm-imgwrap{ position:relative; display:block; }
  .fm-creature img.fm-img{ width:100%; display:block; filter:drop-shadow(0 7px 9px rgba(0,0,0,0.7)); transition:filter .15s ease, transform .15s ease; }
  .fm-creature .tier-seal{ position:absolute; right:-4px; bottom:-4px; width:22px; height:22px; font-size:8px; box-shadow:0 2px 5px rgba(0,0,0,0.7); }
  .fm-name{ position:absolute; left:50%; top:-8px; transform:translate(-50%,-100%); white-space:nowrap;
    font-family:'Cinzel', serif; font-weight:700; font-size:12px; letter-spacing:.05em; color:var(--gold-bright);
    background:rgba(10,7,5,0.88); border:1px solid var(--rule); padding:3px 10px; pointer-events:none;
    opacity:0; transition:opacity .12s ease; text-shadow:0 1px 2px rgba(0,0,0,.8); }
  .fm-creature:hover{ z-index:200 !important; }
  .fm-creature:hover .fm-name{ opacity:1; }
  .fm-creature:hover img.fm-img{ transform:scale(1.12); filter:drop-shadow(0 0 6px var(--fm-glow)) drop-shadow(0 0 16px var(--fm-glow)) drop-shadow(0 7px 9px rgba(0,0,0,0.7)); }
  .fm-C{ --fm-glow:#9a927e; } .fm-UC{ --fm-glow:#1eff00; } .fm-R{ --fm-glow:#0070dd; } .fm-SR{ --fm-glow:#a335ee; } .fm-SSR{ --fm-glow:#ffb52e; }
</style>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>

<div class="topbar">
  <h1>FLOOR MAP</h1>
  <div class="count" id="floor-count">— / 100</div>
</div>

<div id="status">LOADING...</div>
<main id="main" style="display:none;"></main>

<script>
const FLOORS_URL = "codex/floors.csv";
const CREATURES_URL = "codex/creatures.csv";
const IMG_BASE = "https://cdn.jsdelivr.net/gh/eccestanczyk/dfmc@main/";
const RARITY_URL = "codex/floor_creature_rarity.csv";
const TIER_ORDER = { SSR: 0, SR: 1, R: 2, UC: 3, C: 4 };

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') {}
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.filter(r => r.length > 1 || r[0]).map(r => {
    const obj = {};
    header.forEach((h, idx) => obj[h] = r[idx] ?? '');
    return obj;
  });
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// Strips solid green chroma-key background to real transparency, client-side.
function chromaKeyToDataURL(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2];
          const greenness = g - Math.max(r, b);
          if (g > 100 && greenness > 30) {
            const alpha = Math.max(0, 255 - greenness * 3.2);
            data[i+3] = Math.min(data[i+3], alpha);
          }
        }
        ctx.putImageData(imageData, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      } catch (e) {
        resolve(url);
      }
    };
    img.onerror = () => resolve(url);
    img.src = url;
  });
}

async function applyChromaKeyAll() {
  const imgs = document.querySelectorAll('img.chroma[data-src]');
  await Promise.all(Array.from(imgs).map(async (img) => {
    const keyed = await chromaKeyToDataURL(img.dataset.src);
    img.src = keyed;
  }));
}

function tagListHTML(found, mode){
  let html = `<div class="creature-list"${mode==='fallback' ? ' style="display:none;"' : ''}>`;
  found.forEach(c => {
    const pendingClass = c.Art_Status === 'pending' ? ' art-pending' : '';
    html += `<a class="creature-tag${pendingClass}" href="creature.html?id=${escapeHtml(c.ID)}">`;
    html += c.Image_Path ? `<img src="${IMG_BASE}${escapeHtml(c.Image_Path)}" alt="" loading="lazy">` : `<div class="no-img">?</div>`;
    html += `<span class="cn">${escapeHtml(c.Name)}</span>`;
    html += `<span class="tier-seal tier-${c.tier}">${c.tier}</span>`;
    html += `</a>`;
  });
  return html + `</div>`;
}

// Ground-plate map: deterministic scatter identical to floor.html
function floorMapHTML(floorNum, found){
  const plateUrl = IMG_BASE + 'floors/ground_plates/floor_' + String(floorNum).padStart(3,'0') + '.png';
  // neat grid, ordered by rarity (SSR first), left-to-right top-to-bottom
  const list = found.slice().sort((a,b) => (TIER_ORDER[b.tier] - TIER_ORDER[a.tier]) || a.ID.localeCompare(b.ID));
  const n = list.length;
  const cols = Math.min(5, n), rowsN = Math.ceil(n / cols);
  const x0 = 10, x1 = 90, y0 = 38, y1 = 92;
  const w = 15.4;
  const sprites = list.map((c, i) => {
    const cy = Math.floor(i / cols);
    const rowCount = (cy === rowsN - 1) ? (n - cy * cols) : cols;
    const rx = i - cy * cols;
    const pitch = (x1 - x0) / cols;
    const x = x0 + pitch * (rx + 0.5) + pitch * (cols - rowCount) / 2;
    const rowGap = 26;
    const y = Math.min(84, Math.max(16, 50 + (cy - (rowsN - 1) / 2) * rowGap));
    const img = c.Image_Path
      ? `<img class="fm-img" src="${IMG_BASE}${escapeHtml(c.Image_Path)}" alt="${escapeHtml(c.Name)}" loading="lazy">`
      : `<div class="no-img" style="width:100%;aspect-ratio:1;">?</div>`;
    return `
      <a class="fm-creature fm-${c.tier}" href="creature.html?id=${escapeHtml(c.ID)}"
         style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%;width:${w}%;z-index:${cy + 1};"
         title="${escapeHtml(c.Name)} — ${c.tier}">
        <span class="fm-name">${escapeHtml(c.Name)}</span>
        <span class="fm-imgwrap">${img}<span class="tier-seal tier-${c.tier}">${c.tier}</span></span>
      </a>`;
  }).join('');
  return `<div class="floor-map"><img class="fmc-plate" src="${plateUrl}" alt="" loading="lazy"
    onerror="this.closest('.floor-map').style.display='none'; const l=this.closest('.floor-map').nextElementSibling; if(l) l.style.display='flex';">${sprites}</div>`;
}

async function load() {
  try {
    const [floorsText, creaturesText, rarityText] = await Promise.all([
      fetch(FLOORS_URL + '?t=' + Date.now()).then(r => r.text()),
      fetch(CREATURES_URL + '?t=' + Date.now()).then(r => r.text()),
      fetch(RARITY_URL + '?t=' + Date.now()).then(r => r.text()),
    ]);
    const floors = parseCSV(floorsText);
    const creatures = parseCSV(creaturesText);
    const rarityRows = parseCSV(rarityText);

    const creatureById = {};
    creatures.forEach(c => creatureById[c.ID] = c);

    const byFloor = {};
    rarityRows.forEach(row => {
      const c = creatureById[row.Creature_ID];
      if (!c) return;
      if (!byFloor[row.Floor]) byFloor[row.Floor] = [];
      byFloor[row.Floor].push({ ...c, tier: row.Rarity_Tier });
    });
    Object.values(byFloor).forEach(list => list.sort((a,b) => TIER_ORDER[b.tier] - TIER_ORDER[a.tier]));

    floors.sort((a,b) => parseInt(a.Floor) - parseInt(b.Floor));
    document.getElementById('floor-count').textContent = floors.length + ' / 100';

    // group by zone
    const zones = [];
    let currentZone = null;
    floors.forEach(f => {
      if (f.Zone !== currentZone) {
        currentZone = f.Zone;
        zones.push({ name: currentZone, floors: [] });
      }
      zones[zones.length - 1].floors.push(f);
    });

    const main = document.getElementById('main');
    let html = '';

    zones.forEach((zone, zi) => {
      const range = `${zone.floors[0].Floor}–${zone.floors[zone.floors.length-1].Floor}`;

      html += `<div class="zone-block" id="zone-${zi}">`;
      html += `<div class="zone-row" onclick="toggleZone(${zi})">`;
      html += `<span class="zone-chevron">▶</span>`;
      html += `<div class="zone-name-block"><span class="zone-name">${escapeHtml(zone.name)}</span><span class="zone-range">FLOORS ${range}</span></div>`;
      html += `</div>`;

      html += `<div class="floor-list">`;
      html += `<div class="col-headers"><span>FLR</span><span>NAME</span><span>ENCOUNTER</span><span>TYPE</span><span>TIER</span><span>BOSS</span></div>`;

      zone.floors.forEach(f => {
        const isBoss = f.Is_Boss === 'Yes';
        const found = byFloor[f.Floor] || [];
        html += `<div class="floor-row ${isBoss ? 'boss' : ''}">`;
        html += `<div class="f-num">${f.Floor}</div>`;
        html += `<div class="f-name">${escapeHtml(f.Visual_Theme || f.Zone)}</div>`;
        html += `<div class="f-encounter">${escapeHtml(f.Encounter_Type)}</div>`;
        html += `<div class="f-type">${escapeHtml(f.Primary_Type || '—')}</div>`;
        html += `<div class="f-tier">${escapeHtml(f.Tier || '—')}</div>`;
        html += `<div class="f-boss-mark">${isBoss ? '☠' : '—'}</div>`;

        html += f.Cover_Image_Path
          ? `<div class="cover-row"><img class="cover-image" src="${IMG_BASE}${escapeHtml(f.Cover_Image_Path)}" alt=""></div>`
          : `<div class="cover-row"><div class="cover-placeholder"></div></div>`;

        if (isBoss) {
          const bn = (f.Boss_Name && f.Boss_Name !== 'TBD') ? ' — ' + escapeHtml(f.Boss_Name) : '';
          html += `<div style="grid-column:1 / -1; margin-top:8px; padding-top:12px; border-top:1px solid var(--rule-faint); color:var(--blood-glow); font-size:13px; letter-spacing:0.04em;">\u2620 ZONE BOSS${bn}<span style="display:block; margin-top:4px; color:var(--ink-faint); font-style:italic; letter-spacing:0.02em;">Boss team — character + 2 SR creatures, no reserves. No wild encounters on boss floors.</span></div>`;
        } else if (found.length) {
          html += floorMapHTML(f.Floor, found) + tagListHTML(found, 'fallback');
        } else {
          html += `<div class="empty-mark">NO CREATURES ASSIGNED</div>`;
        }
        html += `</div>`;
      });

      html += `</div></div>`;
    });

    main.innerHTML = html;
    document.getElementById('status').style.display = 'none';
    main.style.display = 'block';
    applyChromaKeyAll();
  } catch (err) {
    document.getElementById('status').textContent = 'LOAD FAILED: ' + err.message;
  }
}

function toggleZone(i) {
  document.getElementById('zone-' + i).classList.toggle('open');
}

load();
</script>
<script src="admin.js"></script>
<script src="nav.js"></script>
</body>
</html>
