<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOOR CODEX</title>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="topbar">
  <h1>FLOOR CODEX</h1>
  <div class="count" id="floor-count">— / 100</div>
</div>

<div id="status">LOADING...</div>
<main id="main" style="display:none;"></main>

<script>
const FLOORS_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/floors.csv";
const CREATURES_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/creatures.csv";
const RARITY_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/floor_creature_rarity.csv";
const TIER_ORDER = { SSR: 0, SR: 1, R: 2, UC: 3, C: 4 };

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') {}
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.filter(r => r.length > 1 || r[0]).map(r => {
    const obj = {};
    header.forEach((h, idx) => obj[h] = r[idx] ?? '');
    return obj;
  });
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// Strips solid green chroma-key background to real transparency, client-side.
function chromaKeyToDataURL(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2];
          const greenness = g - Math.max(r, b);
          if (g > 100 && greenness > 30) {
            const alpha = Math.max(0, 255 - greenness * 3.2);
            data[i+3] = Math.min(data[i+3], alpha);
          }
        }
        ctx.putImageData(imageData, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      } catch (e) {
        resolve(url);
      }
    };
    img.onerror = () => resolve(url);
    img.src = url;
  });
}

async function applyChromaKeyAll() {
  const imgs = document.querySelectorAll('img.chroma[data-src]');
  await Promise.all(Array.from(imgs).map(async (img) => {
    const keyed = await chromaKeyToDataURL(img.dataset.src);
    img.src = keyed;
  }));
}

async function load() {
  try {
    const [floorsText, creaturesText, rarityText] = await Promise.all([
      fetch(FLOORS_URL).then(r => r.text()),
      fetch(CREATURES_URL).then(r => r.text()),
      fetch(RARITY_URL).then(r => r.text()),
    ]);
    const floors = parseCSV(floorsText);
    const creatures = parseCSV(creaturesText);
    const rarityRows = parseCSV(rarityText);

    const creatureById = {};
    creatures.forEach(c => creatureById[c.ID] = c);

    const byFloor = {};
    rarityRows.forEach(row => {
      const c = creatureById[row.Creature_ID];
      if (!c) return;
      if (!byFloor[row.Floor]) byFloor[row.Floor] = [];
      byFloor[row.Floor].push({ ...c, tier: row.Rarity_Tier });
    });
    Object.values(byFloor).forEach(list => list.sort((a,b) => TIER_ORDER[a.tier] - TIER_ORDER[b.tier]));

    floors.sort((a,b) => parseInt(a.Floor) - parseInt(b.Floor));
    document.getElementById('floor-count').textContent = floors.length + ' / 100';

    // group by zone
    const zones = [];
    let currentZone = null;
    floors.forEach(f => {
      if (f.Zone !== currentZone) {
        currentZone = f.Zone;
        zones.push({ name: currentZone, floors: [] });
      }
      zones[zones.length - 1].floors.push(f);
    });

    const main = document.getElementById('main');
    let html = '';

    zones.forEach((zone, zi) => {
      const range = `${zone.floors[0].Floor}–${zone.floors[zone.floors.length-1].Floor}`;

      // unique creatures across this zone's floors, keeping their best (rarest) tier seen, sorted rarest-first
      const seen = new Map();
      zone.floors.forEach(f => {
        (byFloor[f.Floor] || []).forEach(c => {
          const existing = seen.get(c.ID);
          if (!existing || TIER_ORDER[c.tier] < TIER_ORDER[existing.tier]) seen.set(c.ID, c);
        });
      });
      const zoneCreatures = Array.from(seen.values()).sort((a,b) => TIER_ORDER[a.tier] - TIER_ORDER[b.tier]);

      html += `<div class="zone-block" id="zone-${zi}">`;
      html += `<div class="zone-row" onclick="toggleZone(${zi})">`;
      html += `<span class="zone-chevron">▶</span>`;
      html += `<div class="zone-name-block"><span class="zone-name">${escapeHtml(zone.name)}</span><span class="zone-range">FLOORS ${range}</span></div>`;
      html += `<div class="zone-thumbs">`;
      if (zoneCreatures.length) {
        zoneCreatures.forEach(c => {
          html += c.Image_Path ? `<img class="chroma" data-src="${escapeHtml(c.Image_Path)}" alt="${escapeHtml(c.Name)}" title="${escapeHtml(c.Name)}">` : `<div class="no-img">?</div>`;
        });
      } else {
        html += `<span style="font-size:10px;color:var(--text-dim);">NO CREATURES YET</span>`;
      }
      html += `</div></div>`;

      html += `<div class="floor-list">`;
      html += `<div class="col-headers"><span>FLR</span><span>NAME</span><span>ENCOUNTER</span><span>TYPE</span><span>TIER</span><span>BOSS</span></div>`;

      zone.floors.forEach(f => {
        const isBoss = f.Is_Boss === 'Yes';
        const found = byFloor[f.Floor] || [];
        html += `<div class="floor-row ${isBoss ? 'boss' : ''}">`;
        html += `<div class="f-num">${f.Floor}</div>`;
        html += `<div class="f-name">${escapeHtml(f.Visual_Theme || f.Zone)}</div>`;
        html += `<div class="f-encounter">${escapeHtml(f.Encounter_Type)}</div>`;
        html += `<div class="f-type">${escapeHtml(f.Primary_Type || '—')}</div>`;
        html += `<div class="f-tier">${escapeHtml(f.Tier || '—')}</div>`;
        html += `<div class="f-boss-mark">${isBoss ? '☠' : '—'}</div>`;

        html += f.Cover_Image_Path
          ? `<div class="cover-row"><img class="cover-image" src="${escapeHtml(f.Cover_Image_Path)}" alt=""></div>`
          : `<div class="cover-row"><div class="cover-placeholder"></div></div>`;

        if (found.length) {
          html += `<div class="creature-list">`;
          found.forEach(c => {
            html += `<a class="creature-tag" href="creature.html?id=${escapeHtml(c.ID)}">`;
            html += c.Image_Path ? `<img class="chroma" data-src="${escapeHtml(c.Image_Path)}" alt="">` : `<div class="no-img">?</div>`;
            html += `<span class="cn">${escapeHtml(c.Name)}</span><span class="cs">S${escapeHtml(c.Stage)}</span>`;
            html += `<span class="tier-seal tier-${c.tier}">${c.tier}</span>`;
            html += `</a>`;
          });
          html += `</div>`;
        } else {
          html += `<div class="empty-mark">NO CREATURES ASSIGNED</div>`;
        }
        html += `</div>`;
      });

      html += `</div></div>`;
    });

    main.innerHTML = html;
    document.getElementById('status').style.display = 'none';
    main.style.display = 'block';
    applyChromaKeyAll();
  } catch (err) {
    document.getElementById('status').textContent = 'LOAD FAILED: ' + err.message;
  }
}

function toggleZone(i) {
  document.getElementById('zone-' + i).classList.toggle('open');
}

load();
</script>
</body>
</html>
