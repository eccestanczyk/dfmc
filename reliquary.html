<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELIQUARY</title>
<link rel="stylesheet" href="theme.css?v=4">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
.rq-wrap{ max-width:920px; margin:0 auto; padding:24px 20px 100px; }
.rq-category{ border:1px solid var(--rule); background:var(--surface); margin-bottom:12px; box-shadow:inset 0 1px 0 rgba(207,166,80,0.07), inset 0 0 60px rgba(0,0,0,0.3), 0 5px 14px rgba(0,0,0,0.4); }
.rq-header{ display:flex; align-items:center; gap:14px; padding:16px 20px; user-select:none; border-bottom:1px solid var(--rule); background:linear-gradient(90deg, rgba(124,21,25,0.14), transparent 70%); }
.rq-icon{ font-size:22px; opacity:0.85; }
.rq-title{ font-family:'Cinzel',serif; font-weight:700; font-size:18px; letter-spacing:0.04em; color:var(--gold-bright); text-transform:uppercase; }
.rq-count{ font-size:13px; color:var(--ink-dim); font-style:italic; margin-left:auto; }
.rq-body{ display:block; padding:18px 20px; }
.rq-sub{ font-family:'Cinzel',serif; font-size:13px; font-weight:600; letter-spacing:0.04em; color:var(--gold); margin:14px 0 8px; text-transform:uppercase; }
.rq-sub:first-child{ margin-top:0; }
.rq-item-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:8px; }
.rq-grid-3{ grid-template-columns:repeat(3, 1fr); }
.rq-grid-2{ grid-template-columns:repeat(2, 1fr); }
.rq-item.with-img{ text-align:center; padding:14px 12px 12px; }
.rq-item.with-img img{ width:100%; max-width:150px; aspect-ratio:3/4; object-fit:contain; display:block; margin:0 auto 8px; filter:drop-shadow(0 5px 10px rgba(0,0,0,0.7)); }
.rq-item{ background:var(--surface-2); border:1px solid var(--rule-faint); padding:10px 12px; text-decoration:none; color:inherit; display:block; transition:border-color 0.14s; }
.rq-item:hover{ border-color:var(--blood-bright); }
.rq-item-name{ color:var(--ink); font-weight:600; margin-bottom:3px; }
.rq-item-desc{ font-size:12px; color:var(--ink-dim); font-style:italic; }
.rq-note{ font-size:14px; color:var(--ink-faint); font-style:italic; }
table.rq-table{ width:100%; border-collapse:collapse; font-size:14px; margin-top:8px; }
table.rq-table th{ font-family:'Cinzel',serif; font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:0.06em; text-align:left; padding:7px 10px; border-bottom:1px solid var(--rule); }
table.rq-table td{ padding:7px 10px; color:var(--ink-dim); border-bottom:1px solid var(--rule-faint); }
table.rq-table td:first-child{ color:var(--ink); font-weight:600; }
</style>
</head>
<body>
<div class="topbar"><h1>RELIQUARY</h1></div>
<div id="status" style="padding:40px;text-align:center;color:var(--ink-dim);font-style:italic;">LOADING...</div>
<div class="rq-wrap" id="content" style="display:none;"></div>

<script>
const IMG_BASE = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/";
const ITEMS_URL = IMG_BASE + "codex/items.csv";
function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/\r/g,''));
  return lines.slice(1).map(line=>{
    const vals=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){const ch=line[i];
      if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim().replace(/\r/g,''));cur='';}else cur+=ch;}
    vals.push(cur.trim().replace(/\r/g,''));
    const o={};headers.forEach((h,i)=>o[h]=vals[i]||'');return o;});
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const CAT_META = {
  'Weapon':    {icon:'⚔', title:'Weapons',      groupBy:null, grid:'rq-grid-3', img:f=>IMG_BASE+'codex/images/classes/CLS-'+f.toUpperCase()+'-1.png'},
  'Armour':    {icon:'🛡', title:'Armour',       groupBy:null, grid:'rq-grid-2'},
  'Accessory': {icon:'💍', title:'Accessories',  groupBy:null},
  'Tag':       {icon:'🏷', title:'Creature Tags', groupBy:null},
  'Gem':       {icon:'💎', title:'Gems',         groupBy:null},
  'Rune':      {icon:'🔷', title:'Runes',        groupBy:null},
  'Scroll':    {icon:'📜', title:'Scrolls',      groupBy:null},
};
const CAT_ORDER = ['Weapon','Armour','Accessory','Tag','Gem','Rune','Scroll'];

(async function(){
  let rows;
  try{ rows = parseCSV(await fetch(ITEMS_URL+'?t='+Date.now()).then(r=>r.text())); }
  catch(e){ document.getElementById('status').textContent='Failed to load: '+e.message; return; }

  // Collapse to one entry per Family (base type)
  const fams = {};
  rows.forEach(r=>{
    const f=(r.Family||'').trim();
    if(!f||r.Category==='Material')return;
    if(!fams[f]) fams[f]={family:f, category:r.Category.trim(), slot:r.Slot.trim(), effect:r.Effect.trim()};
  });

  const byCat={};
  Object.values(fams).forEach(v=>{ (byCat[v.category]=byCat[v.category]||[]).push(v); });

  let html='';
  CAT_ORDER.forEach(cat=>{
    const list=byCat[cat]; if(!list||!list.length) return;
    const meta=CAT_META[cat];
    html+=`<div class="rq-category">
      <div class="rq-header"><span class="rq-icon">${meta.icon}</span>
      <span class="rq-title">${meta.title}</span><span class="rq-count">${list.length} base types</span></div>
      <div class="rq-body">`;
    if(meta.groupBy==='Slot'){
      const slots={}; list.forEach(v=>{(slots[v.slot]=slots[v.slot]||[]).push(v);});
      Object.keys(slots).forEach(s=>{
        html+=`<div class="rq-sub">${esc(s)}</div><div class="rq-item-grid">`;
        slots[s].forEach(v=>{ html+=itemCard(v); });
        html+=`</div>`;
      });
    } else {
      html+=`<div class="rq-item-grid ${meta.grid||''}">`;
      list.forEach(v=>{ html+=itemCard(v, meta); });
      html+=`</div>`;
    }
    html+=`</div></div>`;
  });

  // Materials + grades static reference
  html+=`<div class="rq-category">
    <div class="rq-header"><span class="rq-icon">🧱</span>
    <span class="rq-title">Materials</span><span class="rq-count">5 families</span></div>
    <div class="rq-body"><table class="rq-table">
      <tr><th>Material</th><th>Source</th><th>Used For</th></tr>
      <tr><td>Scrap</td><td>Dismantling gear</td><td>Crafting gear, refinement</td></tr>
      <tr><td>Ichor</td><td>Dismantling Rare+ gear</td><td>Grading up gear</td></tr>
      <tr><td>Dust</td><td>Dismantling gems</td><td>Crafting & grading gems</td></tr>
      <tr><td>Essence</td><td>Dismantling runes</td><td>Crafting & grading runes</td></tr>
      <tr><td>Ink</td><td>Dismantling scrolls</td><td>Crafting scrolls, rerolling enchantments</td></tr>
    </table></div></div>`;

  document.getElementById('content').innerHTML=html;
  document.getElementById('status').style.display='none';
  document.getElementById('content').style.display='block';

  function itemCard(v, meta){
    let desc = v.effect ? v.effect.split(',')[0] : v.category;
    desc = desc.split('(')[0].replace(/^\+/,'').replace(/^Creature\s+/i,'').replace(/^flat\s+/i,'').trim();
    if(!desc) desc = v.category;
    const img = (meta && meta.img) ? `<img src="${meta.img(v.family)}" alt="${esc(v.family)}" loading="lazy">` : '';
    return `<a class="rq-item${img?' with-img':''}" href="item.html?type=${encodeURIComponent(v.family)}">
      ${img}<div class="rq-item-name">${esc(v.family)}</div>
      <div class="rq-item-desc">${esc(desc)}</div></a>`;
  }
})();
</script>
<script src="nav.js"></script>
<script src="admin.js"></script>
</body>
</html>
