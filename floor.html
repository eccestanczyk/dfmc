<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOOR</title>
<link rel="stylesheet" href="theme.css?v=4">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
/* Floor page: mini codex-style creature cards */
.floor-cgrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(108px, 1fr)); gap:10px; }
.fc-card{
  display:flex; flex-direction:column; text-decoration:none; color:var(--ink);
  background:var(--surface); border:1px solid var(--rule);
  box-shadow:inset 0 1px 0 rgba(207,166,80,0.05), 0 3px 8px rgba(0,0,0,0.3);
  transition:all 0.14s ease;
}
.fc-card:hover{ border-color:var(--blood-bright); box-shadow:0 0 12px rgba(124,21,25,0.35); transform:translateY(-1px); }
.fc-card:hover .fc-name{ color:var(--blood-bright); }
.fc-img{ width:100%; aspect-ratio:1; object-fit:cover; background:#1c1610; border-bottom:1px solid var(--rule); display:block; }
.fc-noimg{ width:100%; aspect-ratio:1; background:#1c1610; border-bottom:1px solid var(--rule); display:flex; align-items:center; justify-content:center; color:var(--ink-faint); font-size:11px; font-style:italic; }
.fc-body{ padding:7px 8px 8px; }
.fc-name{ font-family:'Cinzel', serif; font-weight:700; font-size:12px; color:var(--ink); line-height:1.2; margin-bottom:3px; }
.fc-num{ font-family:'Cinzel', serif; font-weight:600; font-size:10px; color:var(--ink-dim); margin-right:5px; }
.fc-types{ font-size:10px; color:var(--ink-dim); font-style:italic; margin-bottom:5px; line-height:1.3; }
.fc-rarity{ display:flex; align-items:center; }
.fc-rarity .tier-seal{ width:20px; height:20px; font-size:8px; }

/* Floor map: ground plate with creatures placed on it */
.floor-map{ position:relative; isolation:isolate; width:100%; aspect-ratio:3/2; background:#0d0a07 center/cover no-repeat; border:1px solid var(--rule); box-shadow:inset 0 0 60px rgba(0,0,0,0.55), 0 6px 18px rgba(0,0,0,0.4); overflow:hidden; }
.fm-creature{ position:absolute; transform:translate(-50%,-50%); text-decoration:none; display:block; }
.fm-creature .fm-imgwrap{ position:relative; display:block; }
.fm-creature img.fm-img{ width:100%; display:block; filter:drop-shadow(0 7px 9px rgba(0,0,0,0.7)); transition:filter .15s ease, transform .15s ease; }
.fm-creature .tier-seal{ position:absolute; right:-4px; bottom:-4px; width:22px; height:22px; font-size:8px; box-shadow:0 2px 5px rgba(0,0,0,0.7); }
.fm-name{ position:absolute; left:50%; top:-8px; transform:translate(-50%,-100%); white-space:nowrap;
  font-family:'Cinzel', serif; font-weight:700; font-size:12px; letter-spacing:.05em; color:var(--gold-bright);
  background:rgba(10,7,5,0.88); border:1px solid var(--rule); padding:3px 10px; pointer-events:none;
  opacity:0; transition:opacity .12s ease; text-shadow:0 1px 2px rgba(0,0,0,.8); }
.fm-creature:hover{ z-index:200 !important; }
.fm-creature:hover .fm-name{ opacity:1; }
.fm-creature:hover img.fm-img{ transform:scale(1.12); filter:drop-shadow(0 0 6px var(--fm-glow)) drop-shadow(0 0 16px var(--fm-glow)) drop-shadow(0 7px 9px rgba(0,0,0,0.7)); }
.fm-C{ --fm-glow:#9a927e; } .fm-UC{ --fm-glow:#1eff00; } .fm-R{ --fm-glow:#0070dd; } .fm-SR{ --fm-glow:#a335ee; } .fm-SSR{ --fm-glow:#ffb52e; }
.map-caption{ font-size:12px; font-style:italic; color:var(--ink-faint); margin-top:8px; }
</style>
</head>
<body>

<div class="topbar">
<h1 id="topbar-title">FLOOR</h1>
  <div class="nav-arrows">
    <a id="prev-arrow" href="#">‹ PREV</a>
    <a id="next-arrow" href="#">NEXT ›</a>
  </div>
</div>

<div id="status">LOADING...</div>
<main id="main">
  <div class="hero" id="hero">
    <div class="f-num-badge" id="f-num"></div>
    <h2 id="f-name"></h2>
    <div class="meta-line">ZONE: <b id="f-zone"></b></div>
    <div class="meta-line">ENCOUNTER: <b id="f-encounter"></b> &nbsp; TYPE: <b id="f-type"></b> &nbsp; TIER: <b id="f-tier"></b></div>
    <div id="cover-slot"></div>
  </div>

  <section>
    <h3>Creatures Found Here</h3>
    <div class="section-body" id="creatures-body"></div>
  </section>

  <section>
    <h3>Treasures</h3>
    <div class="section-body">
      <div class="pending-note">No chest/treasure data defined yet for this floor.</div>
    </div>
  </section>
</main>

<script>
const IMG_BASE = 'https://raw.githubusercontent.com/eccestanczyk/dfmc/main/';
const FLOORS_URL = "codex/floors.csv";
const CREATURES_URL = "codex/creatures.csv";
const RARITY_URL = "codex/floor_creature_rarity.csv";
const TIER_ORDER = { SSR: 0, SR: 1, R: 2, UC: 3, C: 4 };

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') {}
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.filter(r => r.length > 1 || r[0]).map(r => {
    const obj = {};
    header.forEach((h, idx) => obj[h] = r[idx] ?? '');
    return obj;
  });
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function chromaKeyToDataURL(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2];
          const greenness = g - Math.max(r, b);
          if (g > 100 && greenness > 30) {
            const alpha = Math.max(0, 255 - greenness * 3.2);
            data[i+3] = Math.min(data[i+3], alpha);
          }
        }
        ctx.putImageData(imageData, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      } catch (e) { resolve(url); }
    };
    img.onerror = () => resolve(url);
    img.src = url;
  });
}
async function applyChromaKeyAll() {
  const imgs = document.querySelectorAll('img.chroma[data-src]');
  await Promise.all(Array.from(imgs).map(async (img) => {
    img.src = await chromaKeyToDataURL(img.dataset.src);
  }));
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const num = params.get('num');
  if (!num) { document.getElementById('status').textContent = 'NO FLOOR NUMBER SPECIFIED'; return; }

  try {
    const [floorsText, creaturesText, rarityText] = await Promise.all([
      fetch(FLOORS_URL + '?t=' + Date.now()).then(r => r.text()),
      fetch(CREATURES_URL + '?t=' + Date.now()).then(r => r.text()),
      fetch(RARITY_URL + '?t=' + Date.now()).then(r => r.text()),
    ]);
    const floors = parseCSV(floorsText).sort((a,b) => parseInt(a.Floor) - parseInt(b.Floor));
    const creatures = parseCSV(creaturesText);
    const rarityRows = parseCSV(rarityText);

    const creatureById = {};
    creatures.forEach(c => creatureById[c.ID] = c);

    const idx = floors.findIndex(f => f.Floor === num);
    if (idx === -1) { document.getElementById('status').textContent = 'FLOOR NOT FOUND: ' + num; return; }
    const f = floors[idx];
    const prev = floors[idx - 1];
    const next = floors[idx + 1];
    const isBoss = f.Is_Boss === 'Yes';

    document.title = 'FLOOR ' + f.Floor + ' — ' + f.Visual_Theme;
    document.getElementById('topbar-title').textContent = 'FLOOR ' + f.Floor;
    document.getElementById('f-num').textContent = f.Floor;
    document.getElementById('f-name').innerHTML = escapeHtml(f.Visual_Theme || f.Zone) + (isBoss ? '<span class="boss-tag">Boss Floor</span>' : '');
    document.getElementById('f-zone').textContent = f.Zone;
    document.getElementById('f-encounter').textContent = f.Encounter_Type;
    document.getElementById('f-type').textContent = f.Primary_Type || '—';
    document.getElementById('f-tier').textContent = f.Tier || '—';
    if (isBoss) document.getElementById('hero').classList.add('boss');

    document.getElementById('cover-slot').innerHTML = f.Cover_Image_Path
      ? `<img class="cover-image" src="${escapeHtml(f.Cover_Image_Path)}" alt="">`
      : `<div class="cover-placeholder"></div>`;

    const here = rarityRows.filter(r => r.Floor === num)
      .map(r => ({ ...creatureById[r.Creature_ID], tier: r.Rarity_Tier }))
      .filter(c => c.ID)
      .sort((a,b) => TIER_ORDER[a.tier] - TIER_ORDER[b.tier]);

    const cbody = document.getElementById('creatures-body');
    const plateUrl = IMG_BASE + 'floors/ground_plates/floor_' + String(num).padStart(3,'0') + '.png';
    function renderGrid(){
      cbody.innerHTML = here.length
        ? `<div class="floor-cgrid">` + here.map(c => {
            const cn = parseInt((c.ID||'').replace('DFMC-',''), 10) || '';
            const types = [c.Type_Primary, c.Type_Secondary, c.Type_Tertiary].filter(Boolean).map(escapeHtml).join(' / ');
            const img = c.Image_Path
              ? `<img class="fc-img" src="${IMG_BASE}${escapeHtml(c.Image_Path)}" alt="${escapeHtml(c.Name)}" loading="lazy">`
              : `<div class="fc-noimg">?</div>`;
            return `
              <a class="fc-card" href="creature.html?id=${escapeHtml(c.ID)}">
                ${img}
                <div class="fc-body">
                  <div class="fc-name"><span class="fc-num">${cn}</span>${escapeHtml(c.Name)}</div>
                  <div class="fc-types">${types} — Stage ${escapeHtml(c.Stage)}</div>
                  <div class="fc-rarity"><div class="tier-seal tier-${c.tier}">${c.tier}</div></div>
                </div>
              </a>`;
          }).join('') + `</div>`
        : `<div class="pending-note">No creatures assigned to this floor yet.</div>`;
    }
    function renderMap(){
      // neat grid, ordered by rarity (SSR first), left-to-right top-to-bottom
      const list = here.slice().sort((a,b) => (TIER_ORDER[b.tier] - TIER_ORDER[a.tier]) || a.ID.localeCompare(b.ID));
      const n = list.length;
      const cols = Math.min(5, n), rowsN = Math.ceil(n / cols);
      const x0 = 10, x1 = 90, y0 = 38, y1 = 92;
      const w = 15.4;
      const sprites = list.map((c, i) => {
        const cx = i % cols, cy = Math.floor(i / cols);
        const rowCount = (cy === rowsN - 1) ? (n - cy * cols) : cols; // center a short last row
        const rx = i - cy * cols;
        const pitch = (x1 - x0) / cols;
    const x = x0 + pitch * (rx + 0.5) + pitch * (cols - rowCount) / 2;
        const rowGap = 26;
    const y = Math.min(84, Math.max(16, 50 + (cy - (rowsN - 1) / 2) * rowGap));
        const img = c.Image_Path
          ? `<img class="fm-img" src="${IMG_BASE}${escapeHtml(c.Image_Path)}" alt="${escapeHtml(c.Name)}" loading="lazy">`
          : `<div class="fc-noimg" style="width:100%;aspect-ratio:1;">?</div>`;
        return `
          <a class="fm-creature fm-${c.tier}" href="creature.html?id=${escapeHtml(c.ID)}"
             style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%;width:${w}%;z-index:${cy + 1};"
             title="${escapeHtml(c.Name)} — ${c.tier}">
            <span class="fm-name">${escapeHtml(c.Name)}</span>
            <span class="fm-imgwrap">${img}<span class="tier-seal tier-${c.tier}">${c.tier}</span></span>
          </a>`;
      }).join('');
      cbody.innerHTML = `<div class="floor-map" style="background-image:url('${plateUrl}')">${sprites}</div>
        <div class="map-caption">Hover a creature to highlight it (glow = rarity). Click to open its codex page.</div>`;
    }
    if (!here.length) {
      cbody.innerHTML = `<div class="pending-note">No creatures assigned to this floor yet.</div>`;
    } else {
      const probe = new Image();
      probe.onload = renderMap;
      probe.onerror = renderGrid;
      probe.src = plateUrl;
    }

    if (prev) document.getElementById('prev-arrow').href = `floor.html?num=${prev.Floor}`;
    else document.getElementById('prev-arrow').classList.add('disabled');
    if (next) document.getElementById('next-arrow').href = `floor.html?num=${next.Floor}`;
    else document.getElementById('next-arrow').classList.add('disabled');

    document.getElementById('status').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    applyChromaKeyAll();
  } catch (err) {
    document.getElementById('status').textContent = 'LOAD FAILED: ' + err.message;
  }
}
load();
</script>
<script src="admin.js"></script>
<script src="nav.js"></script>
</body>
</html>
