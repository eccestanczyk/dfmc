<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOOR</title>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="topbar">
  <a class="index-btn" href="floor-codex.html">← INDEX</a>
  <h1 id="topbar-title">FLOOR</h1>
  <div class="nav-arrows">
    <a id="prev-arrow" href="#">‹ PREV</a>
    <a id="next-arrow" href="#">NEXT ›</a>
  </div>
</div>

<div id="status">LOADING...</div>
<main id="main">
  <div class="hero" id="hero">
    <div class="f-num-badge" id="f-num"></div>
    <h2 id="f-name"></h2>
    <div class="meta-line">ZONE: <b id="f-zone"></b></div>
    <div class="meta-line">ENCOUNTER: <b id="f-encounter"></b> &nbsp; TYPE: <b id="f-type"></b> &nbsp; TIER: <b id="f-tier"></b></div>
    <div id="cover-slot"></div>
  </div>

  <section>
    <h3>Creatures Found Here</h3>
    <div class="section-body" id="creatures-body"></div>
  </section>

  <section>
    <h3>Treasures</h3>
    <div class="section-body">
      <div class="pending-note">No chest/treasure data defined yet for this floor.</div>
    </div>
  </section>
</main>

<script>
const FLOORS_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/floors.csv";
const CREATURES_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/creatures.csv";
const RARITY_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/floor_creature_rarity.csv";
const TIER_ORDER = { SSR: 0, SR: 1, R: 2, UC: 3, C: 4 };

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r') {}
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.filter(r => r.length > 1 || r[0]).map(r => {
    const obj = {};
    header.forEach((h, idx) => obj[h] = r[idx] ?? '');
    return obj;
  });
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function chromaKeyToDataURL(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2];
          const greenness = g - Math.max(r, b);
          if (g > 100 && greenness > 30) {
            const alpha = Math.max(0, 255 - greenness * 3.2);
            data[i+3] = Math.min(data[i+3], alpha);
          }
        }
        ctx.putImageData(imageData, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      } catch (e) { resolve(url); }
    };
    img.onerror = () => resolve(url);
    img.src = url;
  });
}
async function applyChromaKeyAll() {
  const imgs = document.querySelectorAll('img.chroma[data-src]');
  await Promise.all(Array.from(imgs).map(async (img) => {
    img.src = await chromaKeyToDataURL(img.dataset.src);
  }));
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const num = params.get('num');
  if (!num) { document.getElementById('status').textContent = 'NO FLOOR NUMBER SPECIFIED'; return; }

  try {
    const [floorsText, creaturesText, rarityText] = await Promise.all([
      fetch(FLOORS_URL).then(r => r.text()),
      fetch(CREATURES_URL).then(r => r.text()),
      fetch(RARITY_URL).then(r => r.text()),
    ]);
    const floors = parseCSV(floorsText).sort((a,b) => parseInt(a.Floor) - parseInt(b.Floor));
    const creatures = parseCSV(creaturesText);
    const rarityRows = parseCSV(rarityText);

    const creatureById = {};
    creatures.forEach(c => creatureById[c.ID] = c);

    const idx = floors.findIndex(f => f.Floor === num);
    if (idx === -1) { document.getElementById('status').textContent = 'FLOOR NOT FOUND: ' + num; return; }
    const f = floors[idx];
    const prev = floors[idx - 1];
    const next = floors[idx + 1];
    const isBoss = f.Is_Boss === 'Yes';

    document.title = 'FLOOR ' + f.Floor + ' — ' + f.Visual_Theme;
    document.getElementById('topbar-title').textContent = 'FLOOR ' + f.Floor;
    document.getElementById('f-num').textContent = f.Floor;
    document.getElementById('f-name').innerHTML = escapeHtml(f.Visual_Theme || f.Zone) + (isBoss ? '<span class="boss-tag">Boss Floor</span>' : '');
    document.getElementById('f-zone').textContent = f.Zone;
    document.getElementById('f-encounter').textContent = f.Encounter_Type;
    document.getElementById('f-type').textContent = f.Primary_Type || '—';
    document.getElementById('f-tier').textContent = f.Tier || '—';
    if (isBoss) document.getElementById('hero').classList.add('boss');

    document.getElementById('cover-slot').innerHTML = f.Cover_Image_Path
      ? `<img class="cover-image" src="${escapeHtml(f.Cover_Image_Path)}" alt="">`
      : `<div class="cover-placeholder"></div>`;

    const here = rarityRows.filter(r => r.Floor === num)
      .map(r => ({ ...creatureById[r.Creature_ID], tier: r.Rarity_Tier }))
      .filter(c => c.ID)
      .sort((a,b) => TIER_ORDER[a.tier] - TIER_ORDER[b.tier]);

    document.getElementById('creatures-body').innerHTML = here.length
      ? here.map(c => `
          <a class="creature-row-table" href="creature.html?id=${escapeHtml(c.ID)}">
            ${c.Image_Path ? `<img class="chroma" data-src="${escapeHtml(c.Image_Path)}" alt="">` : `<div class="no-img">?</div>`}
            <div><div class="c-name">${escapeHtml(c.Name)}</div><div class="c-sub">${escapeHtml(c.Type_Primary)}${c.Type_Secondary ? ' / ' + escapeHtml(c.Type_Secondary) : ''} — Stage ${escapeHtml(c.Stage)}</div></div>
            <span class="tier-seal tier-${c.tier}">${c.tier}</span>
          </a>
        `).join('')
      : `<div class="pending-note">No creatures assigned to this floor yet.</div>`;

    if (prev) document.getElementById('prev-arrow').href = `floor.html?num=${prev.Floor}`;
    else document.getElementById('prev-arrow').classList.add('disabled');
    if (next) document.getElementById('next-arrow').href = `floor.html?num=${next.Floor}`;
    else document.getElementById('next-arrow').classList.add('disabled');

    document.getElementById('status').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    applyChromaKeyAll();
  } catch (err) {
    document.getElementById('status').textContent = 'LOAD FAILED: ' + err.message;
  }
}
load();
</script>
</body>
</html>
