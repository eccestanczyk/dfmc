<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFMC — Pending Background Removal</title>
<link rel="stylesheet" href="theme.css">
<style>
  .pending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; padding: 20px; }
  .pending-card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: 6px; overflow: hidden; text-decoration: none; color: var(--fg); transition: border-color 0.2s; }
  .pending-card:hover { border-color: var(--gold); }
  .pending-card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #1a1a1a; }
  .pending-card .info { padding: 8px 10px; font-size: 12px; }
  .pending-card .name { font-weight: bold; color: var(--gold); }
  .pending-card .meta { opacity: 0.6; margin-top: 2px; }
  .pending-card.has-chroma { border-color: #e67e22; }
  .pending-card.bg-pending { border-color: #3498db; }
  .pending-card.manual { border-color: #e74c3c; }
  .page-header { padding: 20px; text-align: center; }
  .page-header h1 { color: var(--gold); font-family: var(--ff-display); }
  .count { color: var(--fg); opacity: 0.6; font-size: 14px; }
  .legend { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 12px; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; }
  .back-link { display: inline-block; margin: 10px 20px; padding: 6px 14px; background: var(--bg-card); border: 1px solid var(--rule); border-radius: 4px; color: var(--gold); text-decoration: none; font-size: 13px; }
</style>
</head>
<body>
<a class="back-link" href="floor-codex.html">← INDEX</a>
<div class="page-header">
  <h1>Pending Background Removal</h1>
  <div class="count" id="count"></div>
  <div class="legend">
    <span><div class="dot" style="background:#e67e22"></div> Needs removal</span>
    <span><div class="dot" style="background:#3498db"></div> Removal done, awaiting approval</span>
    <span><div class="dot" style="background:#e74c3c"></div> Flagged for manual removal</span>
  </div>
</div>
<div class="pending-grid" id="grid"></div>
<script>
const CSV_URL = "codex/creatures.csv?" + Date.now();
function escapeHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;'):'';}
fetch(CSV_URL).then(r=>r.text()).then(text=>{
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  const rows = lines.slice(1).map(line => {
    const vals = []; let inQ=false, cur='';
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){vals.push(cur);cur='';}
      else{cur+=line[i];}
    }
    vals.push(cur);
    const obj={};headers.forEach((h,i)=>obj[h.trim()]=vals[i]||'');return obj;
  });
  const pending = rows.filter(r => r.BG_Status && r.BG_Status !== 'bg_approved' && r.Image_Path);
  document.getElementById('count').textContent = pending.length + ' creatures pending background work';
  const grid = document.getElementById('grid');
  pending.forEach(c => {
    const card = document.createElement('a');
    card.className = 'pending-card ' + (c.BG_Status || '');
    card.href = 'creature.html?id=' + c.ID;
    const statusLabel = c.BG_Status === 'has_chroma' ? 'Needs removal' : c.BG_Status === 'bg_pending' ? 'Awaiting approval' : c.BG_Status === 'manual' ? 'Manual removal' : c.BG_Status;
    card.innerHTML = '<img src="' + escapeHtml(c.Image_Path) + '" alt="' + escapeHtml(c.Name) + '">'
      + '<div class="info"><div class="name">' + escapeHtml(c.Name) + '</div>'
      + '<div class="meta">' + c.ID + ' · ' + statusLabel + '</div></div>';
    grid.appendChild(card);
  });
});
</script>
</body>
</html>
