<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classes — Herumon Tower</title>
<link rel="stylesheet" href="theme.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
.line-block{margin:26px 0}
.line-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.line-title{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:#e8c547}
.access{font-size:10px;padding:2px 10px;border:1px solid #5c462c;border-radius:10px;color:#c2ae8b}
.access.dlc{border-color:#6b2d5a;color:#d78ac0}
.stages{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:720px){.stages{grid-template-columns:1fr}}
.stage-card{background:#161110;border:1px solid #3a2d24;border-radius:10px;padding:12px;text-align:center}
.stage-card .sname{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:#d8c9a8}
.stage-card .slbl{font-size:10px;color:#8a7a5e;letter-spacing:.08em}
.imgbox{aspect-ratio:1;background:#0d0a08;border:1px solid #3a2d24;margin:8px 0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.imgbox img{max-width:100%;max-height:100%}
.pend{color:#8a7a5e;font-size:11px;font-style:italic}
.stats{font-family:monospace;font-size:12px;color:#c2ae8b}
.admin-info{font-size:10px;color:#8a7a5e;text-align:left;margin-top:6px;border-top:1px dashed #3a2d24;padding-top:6px;display:none;word-break:break-word}
.admin .admin-info{display:block}
.status{font-size:10px;padding:1px 8px;border-radius:9px;border:1px solid}
.status.pending{color:#e0a840;border-color:#e0a84055}
.status.approved{color:#7fd4a0;border-color:#7fd4a055}
</style></head><body>
<div class="topbar"><h1>CLASSES</h1></div>
<div style="max-width:980px;margin:0 auto;padding:16px 16px 80px">
  <p style="font-size:13px;color:#8a7a5e">Six player classes — linear three-stage evolution at the standard breakpoints. Stat sums S1 ≈ 12 · S2 ≈ 16 · S3 ≈ 20 across Offense / Defense / Speed (max 10 per axis). Art pipeline mirrors the creature codex: raw generations placed for approval, crops after sign-off.</p>
  <div id="grid"></div>
</div>
<script src="nav.js"></script>
<script>
const IMG_BASE="https://cdn.jsdelivr.net/gh/eccestanczyk/dfmc@main/";
const ADMIN=new URLSearchParams(location.search).get('admin')==='1';
if(ADMIN)document.body.classList.add('admin');
function parseCSV(t){const ls=t.trim().split(/\r?\n/),h=spl(ls[0]);return ls.slice(1).map(l=>{const c=spl(l),o={};h.forEach((k,i)=>o[k.trim()]=(c[i]||'').trim());return o})}
function spl(l){const c=[];let s='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){s+='"';i++}else q=!q}else if(ch===','&&!q){c.push(s);s=''}else s+=ch}c.push(s);return c}
async function load(){
  const rows=parseCSV(await (await fetch('codex/classes.csv?t='+Date.now())).text());
  const lines={};
  rows.forEach(r=>{(lines[r.Line_ID]=lines[r.Line_ID]||[]).push(r)});
  document.getElementById('grid').innerHTML=Object.entries(lines).map(([lid,sts])=>{
    sts.sort((a,b)=>+a.Stage-+b.Stage);
    const chain=sts.map(s=>s.Name).join(' → ');
    const acc=sts[0].Access;
    return `<div class="line-block">
      <div class="line-head"><span class="line-title">${chain}</span><span class="access ${acc==='DLC'?'dlc':''}">${acc}</span></div>
      <div class="stages">${sts.map(s=>{
        const img=s.Image_Path?`<img src="${IMG_BASE}${s.Image_Path}" loading="lazy">`:`<span class="pend">ART PENDING</span>`;
        return `<div class="stage-card">
          <div class="slbl">STAGE ${s.Stage}</div>
          <div class="sname">${s.Name}</div>
          <div class="imgbox">${img}</div>
          <div class="stats">O ${s.Grade_Offense} · D ${s.Grade_Defense} · S ${s.Grade_Speed}</div>
          <div style="margin-top:6px"><span class="status ${s.Art_Status}">${s.Art_Status.toUpperCase()}</span></div>
          <div class="admin-info"><b>${s.Class_ID}</b> · slots: ${s.Option_Slots||'—'} · bg: ${s.BG_Status||'—'}<br>${s.Image_Prompt?s.Image_Prompt.slice(0,220)+'…':'no prompt yet'}</div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
}
load();
</script></body></html>
