<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREATURE CODEX</title>
<link rel="stylesheet" href="theme.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
.filter-bar{
  background:var(--surface); border:1px solid var(--rule); padding:14px 18px; margin-bottom:18px;
  box-shadow:inset 0 1px 0 rgba(207,166,80,0.07), 0 4px 12px rgba(0,0,0,0.35);
}
.filter-group{ margin-bottom:10px; }
.filter-group:last-child{ margin-bottom:0; }
.filter-label{
  font-family:'Cinzel', serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--gold); margin-bottom:6px; display:block;
}
.filter-btns{ display:flex; flex-wrap:wrap; gap:5px; }
.filter-btn{
  font-family:'Cinzel', serif; font-size:11px; font-weight:600; letter-spacing:0.04em;
  padding:4px 10px; border:1px solid var(--rule); background:var(--surface-2); color:var(--ink-dim);
  cursor:pointer; text-transform:uppercase; transition:all 0.14s ease; user-select:none;
}
.filter-btn:hover{ border-color:var(--gold-dim); color:var(--ink); }
.filter-btn.active{ background:var(--blood); border-color:var(--blood-bright); color:var(--ink); box-shadow:0 0 8px rgba(221,86,70,0.3); }
.filter-btn.rarity-C.active{ background:#4a4336; border-color:#6b6352; }
.filter-btn.rarity-UC.active{ background:#2e5428; border-color:#4a7a44; }
.filter-btn.rarity-R.active{ background:#274a6e; border-color:#3f6b9a; }
.filter-btn.rarity-SR.active{ background:#553268; border-color:#7a4a8a; }
.filter-btn.rarity-SSR.active{ background:#6e5020; border-color:#c99a3c; color:#e6c66d; }
.count-badge{ font-size:14px; color:var(--ink-dim); font-style:italic; margin-bottom:14px; }
.codex-grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:12px;
}
.codex-card{
  display:flex; flex-direction:column; text-decoration:none; color:var(--ink);
  background:var(--surface); border:1px solid var(--rule);
  box-shadow:inset 0 1px 0 rgba(207,166,80,0.05), 0 4px 10px rgba(0,0,0,0.3);
  transition:all 0.14s ease; overflow:hidden;
}
.codex-card:hover{ border-color:var(--blood-bright); box-shadow:0 0 14px rgba(124,21,25,0.35); transform:translateY(-1px); }
.codex-card-img{
  width:100%; aspect-ratio:1; object-fit:cover; background:#1c1610;
  border-bottom:1px solid var(--rule); display:block;
}
.codex-card-noimg{
  width:100%; aspect-ratio:1; background:#1c1610; border-bottom:1px solid var(--rule);
  display:flex; align-items:center; justify-content:center;
  color:var(--ink-faint); font-size:11px; font-style:italic;
}
.codex-card-body{ padding:10px 12px 12px; }
.codex-card-name{
  font-family:'Cinzel', serif; font-weight:700; font-size:14px; color:var(--ink);
  margin-bottom:4px; line-height:1.2;
}
.codex-card-types{ font-size:12px; color:var(--ink-dim); font-style:italic; margin-bottom:6px; }
.codex-card-rarity{ display:flex; align-items:center; gap:6px; }
.codex-card-rarity .tier-seal{ width:22px; height:22px; font-size:8px; }
.codex-card-rarity span{ font-size:12px; color:var(--ink-dim); }
.flag{ font-size:11px; margin-left:4px; vertical-align:middle; opacity:0.8; cursor:help; }
.flag-art{ color:#e6c66d; }
.flag-crop{ color:#dd5646; }
.card-img-wrap{ position:relative; }
.card-tabs{ position:absolute; bottom:4px; left:4px; display:flex; gap:2px; }
.card-tab{ font-family:Cinzel,serif; font-size:10px; font-weight:700; padding:2px 6px; border:1px solid #5c462c; background:#14100b; color:#c2ae8b; cursor:pointer; }
.card-tab.active{ background:#7c1519; color:#ede0c4; border-color:#dd5646; }
.card-gear{ position:absolute; top:4px; right:4px; font-size:14px; background:rgba(20,16,11,0.85); border:1px solid #5c462c; color:#cfa650; padding:2px 5px; cursor:pointer; line-height:1; z-index:2; }
.card-gear:hover{ border-color:#dd5646; color:#dd5646; }
.card-admin-menu{ position:absolute; top:100%; right:0; z-index:30; min-width:240px; background:#1e1710; border:1px solid #5c462c; box-shadow:0 8px 24px rgba(0,0,0,0.6); text-align:left; }
.card-admin-menu label{ display:flex; align-items:center; gap:6px; padding:7px 12px; border-bottom:1px solid #3a2c1a; cursor:pointer; font-family:Cinzel,serif; font-size:11px; font-weight:600; color:#c2ae8b; }
.card-admin-menu label:hover{ color:#e6c66d; }
.card-admin-menu label.checked{ color:#dd5646; }
.card-admin-menu textarea{ width:100%; background:#14100b; border:1px solid #3a2c1a; color:#ede0c4; font-family:'EB Garamond',serif; font-size:12px; padding:5px 7px; resize:vertical; box-sizing:border-box; }
</style>
</head>
<body>
<div class="topbar">
  <h1>CREATURE CODEX</h1>
  <div style="display:flex;align-items:center;gap:14px;">
    <span class="count" id="count"></span>
  </div>
</div>
<div id="status">LOADING...</div>
<main id="main" style="display:none; max-width:920px; margin:0 auto; padding:24px 20px 100px;">

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Rarity</span>
      <div class="filter-btns" id="rarity-filters"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Type</span>
      <div class="filter-btns" id="type-filters"></div>
    </div>
    <div class="filter-group">
      <span class="filter-label">Stage</span>
      <div class="filter-btns" id="stage-filters"></div>
    </div>
    <div class="filter-group" id="admin-filters" style="display:none;">
      <span class="filter-label">Pipeline</span>
      <div class="filter-btns">
        <button class="filter-btn" id="filter-pending-art" onclick="togglePipeline('art',this)">🎨 Art Approval Pending</button>
        <button class="filter-btn" id="filter-pending-crop" onclick="togglePipeline('crop',this)">✂ Cropping Pending</button>
        <button class="filter-btn" id="filter-crop-review" onclick="togglePipeline('crop_review',this)">🔍 Crop Approval Pending</button>
      </div>
    </div>
  </div>

  <div class="count-badge" id="result-count"></div>
  <div class="codex-grid" id="grid"></div>
</main>

<script src="admin.js"></script>
<script>
const CREATURES_URL = "https://raw.githubusercontent.com/eccestanczyk/dfmc/main/codex/creatures.csv";

const RARITY_ORDER = ['Common','Uncommon','Rare','Super Rare','Super Super Rare'];
const RARITY_SHORT = {'Common':'C','Uncommon':'UC','Rare':'R','Super Rare':'SR','Super Super Rare':'SSR'};
const TIER_CLASS = {'Common':'tier-C','Uncommon':'tier-UC','Rare':'tier-R','Super Rare':'tier-SR','Super Super Rare':'tier-SSR'};

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/\r/g,''));
  return lines.slice(1).map(line => {
    const vals = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim().replace(/\r/g,'')); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur.trim().replace(/\r/g,''));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let allCreatures = [];
let activeRarity = new Set();
let activeType = new Set();
let activeStage = new Set();
let pipelineFilter = null; // 'art' or 'crop' or null

let _probeTimer;
function togglePipeline(type, btn) {
  if (pipelineFilter === type) {
    pipelineFilter = null;
    btn.classList.remove('active');
  } else {
    pipelineFilter = type;
    document.querySelectorAll('#admin-filters .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  renderGrid();
  clearTimeout(_probeTimer); _probeTimer = setTimeout(probeCardTabs, 100);
}

function toggleFilter(set, val, btn) {
  if (set.has(val)) { set.delete(val); btn.classList.remove('active'); }
  else { set.add(val); btn.classList.add('active'); }
  renderGrid();
  clearTimeout(_probeTimer); _probeTimer = setTimeout(probeCardTabs, 100);
  syncURL();
}

function syncURL() {
  const p = new URLSearchParams();
  if (activeRarity.size) p.set('rarity', [...activeRarity].join(','));
  if (activeType.size) p.set('type', [...activeType].join(','));
  if (activeStage.size) p.set('stage', [...activeStage].join(','));
  const qs = p.toString();
  history.replaceState(null, '', qs ? '?' + qs : location.pathname);
}

const IMG_BASE = 'https://raw.githubusercontent.com/eccestanczyk/dfmc/main/';
const isAdmin = document.documentElement.classList.contains('admin-mode');

const CARD_ACTIONS = [
  { key:'approve_art', label:'Approve art', icon:'✅', show: c => c.Art_Status==='pending' },
  { key:'art_revision', label:'Art revision', icon:'🔄', show: c => c.Art_Status==='approved' },
  { key:'regenerate', label:'Regenerate', icon:'♻️', show:()=>true },
  { key:'generate_option', label:'New option', icon:'➕', show:()=>true },
  { key:'generate_crop', label:'New crop', icon:'✂️', show:()=>true },
  { key:'framing_issue', label:'Framing issue', icon:'🖼', show:()=>true },
  { key:'flip_image', label:'Flip image', icon:'↔', show:()=>true },
];

function renderGrid() {
  let filtered = allCreatures;
  if (activeRarity.size) filtered = filtered.filter(c => activeRarity.has(c.Rarity));
  if (activeType.size) filtered = filtered.filter(c => activeType.has(c.Type_Primary) || activeType.has(c.Type_Secondary));
  if (activeStage.size) filtered = filtered.filter(c => activeStage.has(c.Stage));
  if (pipelineFilter === 'art') filtered = filtered.filter(c => c.Art_Status === 'pending');
  if (pipelineFilter === 'crop') filtered = filtered.filter(c => c.BG_Status === 'has_chroma');
  if (pipelineFilter === 'crop_review') filtered = filtered.filter(c => c.BG_Status === 'bg_pending');

  document.getElementById('result-count').textContent = `Showing ${filtered.length} of ${allCreatures.length} creatures`;

  const grid = document.getElementById('grid');
  const short_r = k => RARITY_SHORT[k]||'?';
  const hasCrop = c => c.BG_Status==='bg_pending'||c.BG_Status==='bg_approved';

  grid.innerHTML = filtered.map(c => {
    const short = short_r(c.Rarity);
    const cls = TIER_CLASS[c.Rarity] || '';
    const types = c.Type_Secondary ? `${c.Type_Primary} / ${c.Type_Secondary}` : c.Type_Primary;
    const origSrc = c.Image_Path ? IMG_BASE + escapeHtml(c.Image_Path) + '?t=' + Date.now() : '';
    const cropSrc = hasCrop(c) && c.Image_Path ? IMG_BASE + 'codex/images/cropped/' + c.ID + '.png?t=' + Date.now() : '';
    const pipelineStyle = c.Art_Status==='pending' ? 'border-color:#cfa650;box-shadow:0 0 8px rgba(207,166,80,0.3);' : c.BG_Status==='has_chroma' ? 'border-color:#dd5646;box-shadow:0 0 8px rgba(221,86,70,0.3);' : c.BG_Status==='bg_pending' ? 'border-color:#60a5fa;box-shadow:0 0 8px rgba(96,165,250,0.3);' : '';

    const imgHtml = origSrc
      ? `<img class="codex-card-img" src="${escapeHtml(origSrc)}" alt="${escapeHtml(c.Name)}" loading="lazy">`
      : `<div class="codex-card-noimg">?</div>`;

    const tabsHtml = isAdmin && origSrc ? `<div class="card-tabs" data-id="${c.ID}" data-base="${escapeHtml(IMG_BASE)}codex/images/"></div>` : '';
    const gearHtml = isAdmin ? `<button class="card-gear" onclick="event.preventDefault();event.stopPropagation();toggleCardMenu(this)" data-id="${c.ID}" data-name="${escapeHtml(c.Name)}" data-art="${c.Art_Status}" data-bg="${c.BG_Status}">⚙</button>` : '';

    return `<div class="codex-card" style="${pipelineStyle};position:relative;cursor:pointer;" onclick="location.href='creature.html?id=${escapeHtml(c.ID)}'">
      <div class="card-img-wrap">${imgHtml}${tabsHtml}${gearHtml}</div>
      <div class="codex-card-body">
        <div class="codex-card-name">${escapeHtml(c.Name)}${c.Art_Status==='pending'?'<span class="flag flag-art" title="Pending art approval">🎨</span>':''}${c.BG_Status==='has_chroma'?'<span class="flag flag-crop" title="Needs cropping">✂</span>':''}${c.BG_Status==='bg_pending'?'<span class="flag" title="Crop approval pending" style="color:#60a5fa;">🔍</span>':''}</div>
        <div class="codex-card-types">${escapeHtml(types)}</div>
        <div class="codex-card-rarity"><div class="tier-seal ${cls}">${short}</div></div>
      </div>
    </div>`;
  }).join('');
}

function switchCardImg(tabBtn, url) {
  const wrap = tabBtn.closest('.card-img-wrap');
  const img = wrap.querySelector('.codex-card-img');
  if (img && url) img.src = url;
  wrap.querySelectorAll('.card-tab').forEach(t => t.classList.remove('active'));
  tabBtn.classList.add('active');
}

// After grid renders, probe for image options A-E + crops and build tabs
const SUFFIXES = ['', '_B', '_C', '_D', '_E'];
const LABELS = ['A', 'B', 'C', 'D', 'E'];

async function probeCardTabs() {
  if (!isAdmin) return;
  const tabContainers = document.querySelectorAll('.card-tabs[data-id]');
  for (const container of tabContainers) {
    const id = container.dataset.id;
    const base = container.dataset.base;
    const t = '?t=' + Date.now();
    const found = [];

    for (let i = 0; i < SUFFIXES.length; i++) {
      const fname = id + SUFFIXES[i] + '.png';
      // Check main
      try {
        const r = await fetch(base + fname + t, { method: 'HEAD' });
        if (r.ok) found.push({ label: LABELS[i], url: base + fname + t });
      } catch {}
      // Check cropped
      try {
        const r = await fetch(base + 'cropped/' + fname + t, { method: 'HEAD' });
        if (r.ok) found.push({ label: LABELS[i] + '✂', url: base + 'cropped/' + fname + t });
      } catch {}
    }

    if (found.length > 1) {
      container.innerHTML = found.map((f, idx) =>
        `<button class="card-tab${idx===0?' active':''}" onclick="event.preventDefault();event.stopPropagation();switchCardImg(this,'${f.url}')">${f.label}</button>`
      ).join('');
    }
  }
}

let openMenu = null;
function toggleCardMenu(gearBtn) {
  const card = gearBtn.closest('.codex-card');
  let menu = card.querySelector('.card-admin-menu');
  if (menu) { menu.remove(); openMenu = null; return; }
  if (openMenu) { openMenu.remove(); openMenu = null; }

  const id = gearBtn.dataset.id;
  const name = gearBtn.dataset.name;
  const artStatus = gearBtn.dataset.art;
  const creature = { Art_Status: artStatus };
  const current = typeof Backlog !== 'undefined' ? Backlog.get(id) : [];
  const currentComment = typeof Backlog !== 'undefined' ? Backlog.getComment(id) : '';

  menu = document.createElement('div');
  menu.className = 'card-admin-menu';
  let html = '';
  CARD_ACTIONS.filter(a => a.show(creature)).forEach(a => {
    const checked = current.includes(a.key);
    html += `<label class="${checked?'checked':''}" onclick="event.stopPropagation()"><input type="checkbox" ${checked?'checked':''} data-action="${a.key}" data-id="${id}" data-name="${name}" style="accent-color:#dd5646;cursor:pointer;">${a.icon} ${a.label}</label>`;
  });
  html += `<div style="padding:8px 12px;border-top:1px solid #5c462c;" onclick="event.stopPropagation()"><div style="font-family:Cinzel,serif;font-size:9px;letter-spacing:0.08em;color:#cfa650;margin-bottom:4px;text-transform:uppercase;">Comment</div><textarea class="card-comment" rows="2" data-id="${id}" data-name="${name}" placeholder="Notes...">${currentComment}</textarea></div>`;
  menu.innerHTML = html;

  menu.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.onchange = function(e) {
      e.stopPropagation();
      if (typeof Backlog !== 'undefined') {
        Backlog.toggle(this.dataset.id, this.dataset.name, this.dataset.action);
        this.parentElement.classList.toggle('checked', this.checked);
        if (window._updateBacklogBtn) window._updateBacklogBtn();
      }
    };
  });
  const ta = menu.querySelector('.card-comment');
  if (ta) {
    ta.onblur = function() {
      if (typeof Backlog !== 'undefined') {
        Backlog.setComment(this.dataset.id, this.dataset.name, this.value.trim());
        if (window._updateBacklogBtn) window._updateBacklogBtn();
      }
    };
    ta.onclick = function(e) { e.stopPropagation(); };
  }

  card.appendChild(menu);
  openMenu = menu;
}

document.addEventListener('click', function() { if (openMenu) { openMenu.remove(); openMenu = null; } });

(async function() {
  try {
    const text = await fetch(CREATURES_URL + '?t=' + Date.now()).then(r => r.text());
    allCreatures = parseCSV(text).sort((a,b) => a.ID.localeCompare(b.ID));

    // Build filter buttons
    const rarityContainer = document.getElementById('rarity-filters');
    RARITY_ORDER.forEach(r => {
      const short = RARITY_SHORT[r];
      const btn = document.createElement('button');
      btn.className = `filter-btn rarity-${short}`;
      btn.textContent = RARITY_SHORT[r] || r;
      btn.onclick = () => toggleFilter(activeRarity, r, btn);
      rarityContainer.appendChild(btn);
    });

    const types = [...new Set(allCreatures.flatMap(c => [c.Type_Primary, c.Type_Secondary].filter(Boolean)))].sort();
    const typeContainer = document.getElementById('type-filters');
    types.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = t;
      btn.onclick = () => toggleFilter(activeType, t, btn);
      typeContainer.appendChild(btn);
    });

    const stages = [...new Set(allCreatures.map(c => c.Stage))].sort();
    const stageContainer = document.getElementById('stage-filters');
    stages.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = 'Stage ' + s;
      btn.onclick = () => toggleFilter(activeStage, s, btn);
      stageContainer.appendChild(btn);
    });

    // Apply URL params as initial filters
    const params = new URLSearchParams(location.search);
    if (params.get('rarity')) {
      params.get('rarity').split(',').forEach(r => {
        if (RARITY_ORDER.includes(r)) {
          activeRarity.add(r);
          const btn = [...rarityContainer.children].find(b => b.textContent === r);
          if (btn) btn.classList.add('active');
        }
      });
    }
    if (params.get('type')) {
      params.get('type').split(',').forEach(t => {
        if (types.includes(t)) {
          activeType.add(t);
          const btn = [...typeContainer.children].find(b => b.textContent === t);
          if (btn) btn.classList.add('active');
        }
      });
    }
    if (params.get('stage')) {
      params.get('stage').split(',').forEach(s => {
        if (stages.includes(s)) {
          activeStage.add(s);
          const btn = [...stageContainer.children].find(b => b.textContent === 'Stage ' + s);
          if (btn) btn.classList.add('active');
        }
      });
    }

    document.getElementById('count').textContent = allCreatures.length + ' creatures';
    document.getElementById('status').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    if (document.documentElement.classList.contains('admin-mode')) {
      document.getElementById('admin-filters').style.display = '';
    }
    renderGrid();
    probeCardTabs();
  } catch (e) {
    document.getElementById('status').textContent = 'FAILED TO LOAD: ' + e.message;
  }
})();
</script>
<script src="nav.js"></script>
</body>
</html>
