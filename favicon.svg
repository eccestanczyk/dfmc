<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Tower Crawler">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1d160e"/>
      <stop offset="100%" stop-color="#0b0805"/>
    </radialGradient>
    <radialGradient id="moon" cx="42%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#ef6b52"/>
      <stop offset="45%" stop-color="#c23a2f"/>
      <stop offset="100%" stop-color="#7c1519"/>
    </radialGradient>
    <radialGradient id="doorglow" cx="50%" cy="82%" r="72%">
      <stop offset="0%" stop-color="#5a1410"/>
      <stop offset="100%" stop-color="#0a0705"/>
    </radialGradient>
    <radialGradient id="basepool" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8342c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c8342c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background tile -->
  <rect x="0" y="0" width="64" height="64" rx="11" fill="url(#bg)"/>

  <!-- blood-moon glow + disc -->
  <circle cx="41" cy="23" r="18.5" fill="#c8342c" opacity="0.28"/>
  <circle cx="41" cy="23" r="13.5" fill="url(#moon)"/>
  <circle cx="46" cy="19" r="3" fill="#7c1519" opacity="0.35"/>
  <circle cx="38" cy="27" r="2.2" fill="#7c1519" opacity="0.3"/>

  <!-- ground + blood pool -->
  <path d="M0 57 Q18 54 32 55 Q46 56 64 57 L64 64 L0 64 Z" fill="#0c0906"/>
  <ellipse cx="32" cy="57.5" rx="15" ry="4.5" fill="url(#basepool)"/>

  <!-- tower silhouette (crenellated, tapered) -->
  <path d="M22 58 L24 23 L24 18 L28 18 L28 23 L30 23 L30 18 L34 18 L34 23 L36 23 L36 18 L40 18 L40 23 L42 58 Z" fill="#120d09"/>
  <!-- moonlit rim on the right edge -->
  <path d="M40 18 L40 23 L42 58" fill="none" stroke="#c23a2f" stroke-width="1" opacity="0.55" stroke-linejoin="round"/>

  <!-- arched doorway with inner glow -->
  <path d="M29 58 L29 52 Q29 48 32 48 Q35 48 35 52 L35 58 Z" fill="url(#doorglow)"/>

  <!-- lit windows -->
  <g fill="#e6c66d">
    <path d="M30.7 43.2 L30.7 40.4 Q30.7 39 32 39 Q33.3 39 33.3 40.4 L33.3 43.2 Z" opacity="0.95"/>
    <path d="M31 36.4 L31 34.2 Q31 33 32 33 Q33 33 33 34.2 L33 36.4 Z" opacity="0.8"/>
  </g>
  <circle cx="32" cy="41" r="3.6" fill="#e6c66d" opacity="0.12"/>

  <!-- wax-seal frame -->
  <rect x="2.25" y="2.25" width="59.5" height="59.5" rx="9" fill="none" stroke="#8a6d2f" stroke-width="1.5" opacity="0.85"/>
</svg>
