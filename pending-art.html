<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFMC — Pending Art Approval</title>
<link rel="stylesheet" href="theme.css?v=4">
<style>
  .pending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; padding: 20px; }
  .pending-card { background: var(--bg-card); border: 1px solid var(--rule); border-radius: 6px; overflow: hidden; text-decoration: none; color: var(--fg); transition: border-color 0.2s; }
  .pending-card:hover { border-color: var(--gold); }
  .pending-card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #1a1a1a; }
  .pending-card .info { padding: 8px 10px; font-size: 12px; }
  .pending-card .name { font-weight: bold; color: var(--gold); }
  .pending-card .meta { opacity: 0.6; margin-top: 2px; }
  .page-header { padding: 20px; text-align: center; }
  .page-header h1 { color: var(--gold); font-family: var(--ff-display); }
  .count { color: var(--fg); opacity: 0.6; font-size: 14px; }
  .back-link { display: inline-block; margin: 10px 20px; padding: 6px 14px; background: var(--bg-card); border: 1px solid var(--rule); border-radius: 4px; color: var(--gold); text-decoration: none; font-size: 13px; }
  .filter-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #aaa; padding: 6px 14px; font-size: 12px; letter-spacing: 0.05em; border-radius: 4px; cursor: pointer; }
  .filter-btn.active { background: rgba(255,200,50,0.2); border-color: var(--gold); color: var(--gold); }
  .filter-btn:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<a class="back-link" href="floor-codex.html">← INDEX</a>
<div class="page-header">
  <h1>⚠ Pending Art Approval</h1>
  <div class="count" id="count"></div>
  <div class="filters" id="filters" style="display:flex;justify-content:center;gap:8px;margin-top:12px;">
    <button class="filter-btn active" onclick="filterStage('all',this)">All</button>
    <button class="filter-btn" onclick="filterStage('1',this)">Stage 1</button>
    <button class="filter-btn" onclick="filterStage('2',this)">Stage 2</button>
    <button class="filter-btn" onclick="filterStage('3',this)">Stage 3</button>
  </div>
</div>
<div class="pending-grid" id="grid"></div>
<script>
const CSV_URL = "codex/creatures.csv?" + Date.now();
const IMG_BASE = "https://cdn.jsdelivr.net/gh/eccestanczyk/dfmc@main/";
function escapeHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;'):'';}
fetch(CSV_URL).then(r=>r.text()).then(text=>{
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  const rows = lines.slice(1).map(line => {
    const vals = []; let inQ=false, cur='';
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){vals.push(cur);cur='';}
      else{cur+=line[i];}
    }
    vals.push(cur);
    const obj={};headers.forEach((h,i)=>obj[h]=((vals[i]||'').trim()));return obj;
  });
  const pending = rows.filter(r => r.Art_Status === 'pending' && r.Image_Path);
  document.getElementById('count').textContent = pending.length + ' creatures awaiting approval';
  const grid = document.getElementById('grid');
  pending.forEach(c => {
    const card = document.createElement('a');
    card.className = 'pending-card';
    card.href = 'creature.html?id=' + c.ID;
    card.dataset.stage = c.Stage;
    card.innerHTML = '<img src="' + IMG_BASE + escapeHtml(c.Image_Path) + '?t=' + Date.now() + '" alt="' + escapeHtml(c.Name) + '">'
      + '<div class="info"><div class="name">' + escapeHtml(c.Name) + '</div>'
      + '<div class="meta">' + c.ID + ' · ' + c.Line_ID + ' S' + c.Stage + '</div></div>';
    grid.appendChild(card);
  });
});
function filterStage(stage, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.pending-card').forEach(card => {
    card.style.display = (stage === 'all' || card.dataset.stage === stage) ? '' : 'none';
  });
  const visible = document.querySelectorAll('.pending-card[style=""],.pending-card:not([style])').length;
  document.getElementById('count').textContent = visible + ' creatures shown';
}
</script>
</body>
</html>
